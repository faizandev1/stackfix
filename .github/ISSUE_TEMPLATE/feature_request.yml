name: 💡 Feature Request
description: Suggest an idea or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear description of what the problem is.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Parser (new language support)
        - Provider (new data source)
        - CLI (new command/flag)
        - UI / output
        - Performance
        - Documentation
        - Other
